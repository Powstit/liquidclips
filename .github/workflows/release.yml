# ───── IRON GATE IG-013 (v0.7.50) — see desktop/docs/IRON_GATES.md ─────
# Apple notarisation orchestrator. Paired with desktop/scripts/notarize.sh.
# The 5 secrets (APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_ID,
# APPLE_PASSWORD, APPLE_TEAM_ID) on Powstit/liquidclips are the source of
# truth — set 2026-06-02. NEVER swap apple-actions/import-codesign-certs@v3
# for an unversioned ref. NEVER drop `--options runtime --timestamp` from
# the codesign pass. Hardened runtime is mandatory; Apple rejects without it.

name: Release
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        # Two parallel jobs — each runs natively on its architecture's runner so
        # the brew sidecar (ffmpeg, ffprobe) is the matching arch. Apple Silicon
        # users get _aarch64.dmg, Intel users get _x86_64.dmg. Both DMGs upload
        # to the same release tag.
        target:
          - runner: macos-latest
            arch: aarch64
            rust_target: aarch64-apple-darwin
            slug: aarch64
          # GitHub deprecated/retired macos-13 Intel capacity; use the
          # supported standard Intel image so x86_64 releases do not sit
          # queued until the run is cancelled.
          - runner: macos-15-intel
            arch: x86_64
            rust_target: x86_64-apple-darwin
            slug: x86_64
    runs-on: ${{ matrix.target.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal builds need BOTH targets so lipo can combine them.
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: install frontend dependencies
        run: npm install
        working-directory: ./desktop

      - name: verify updater signing key matches tauri pubkey
        working-directory: ./desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          brew install minisign
          CANARY="$(mktemp)"
          PUBKEY_FILE="$(mktemp)"
          SIG_FILE="$(mktemp)"
          printf 'liquid-clips-updater-key-check\n' > "$CANARY"
          npx tauri signer sign "$CANARY"
          node -e "const fs=require('fs'); const c=JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json','utf8')); fs.writeFileSync(process.argv[1], Buffer.from(c.plugins.updater.pubkey, 'base64'));" "$PUBKEY_FILE"
          base64 -d -i "$CANARY.sig" > "$SIG_FILE"
          minisign -Vm "$CANARY" -x "$SIG_FILE" -p "$PUBKEY_FILE"
          EXPECTED='B1E037066BFCE444'
          ACTUAL="$(sed -n 's/^untrusted comment: minisign public key: //p' "$PUBKEY_FILE" | tr -d '[:space:]')"
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "✗ updater pubkey fingerprint mismatch: expected $EXPECTED, got $ACTUAL" >&2
            exit 1
          fi
          echo "✓ updater signing secret matches tauri pubkey $ACTUAL"

      # Sidecar binaries are .gitignored (ffmpeg 76MB, ffprobe 76MB,
      # whisper-tiny 75MB) so CI must fetch them before the Tauri build — the
      # bundle.resources entries in tauri.conf.json hard-require these paths.
      # Falling back to brew + huggingface_hub keeps the workflow
      # self-contained (no third-party CDN auth, no LFS).
      - name: fetch ffmpeg + ffprobe (sidecar binaries)
        run: |
          set -euo pipefail
          mkdir -p desktop/python-sidecar/bin
          # Per-arch native fetch — each matrix runner pulls the brew ffmpeg
          # matching its own architecture. arm64 runner → arm64 binary;
          # x86_64 runner → x86_64 binary. The DMG built on this runner
          # therefore ships a native sidecar.
          brew install ffmpeg
          cp -f "$(brew --prefix)/bin/ffmpeg"  desktop/python-sidecar/bin/ffmpeg
          cp -f "$(brew --prefix)/bin/ffprobe" desktop/python-sidecar/bin/ffprobe
          chmod +x desktop/python-sidecar/bin/ffmpeg desktop/python-sidecar/bin/ffprobe
          file desktop/python-sidecar/bin/ffmpeg
          ls -lah desktop/python-sidecar/bin/

      - name: fetch faster-whisper-tiny model
        run: |
          set -euo pipefail
          python3 -m pip install --quiet --break-system-packages huggingface_hub
          python3 - <<'PY'
          from huggingface_hub import snapshot_download
          import shutil, os
          dest = "desktop/python-sidecar/models/faster-whisper-tiny"
          os.makedirs(dest, exist_ok=True)
          src = snapshot_download(
              repo_id="Systran/faster-whisper-tiny",
              allow_patterns=["config.json", "model.bin", "tokenizer.json", "vocabulary.txt"],
          )
          for fname in ("config.json", "model.bin", "tokenizer.json", "vocabulary.txt"):
              shutil.copy(os.path.join(src, fname), os.path.join(dest, fname))
          PY
          ls -lah desktop/python-sidecar/models/faster-whisper-tiny/

      # xattr strip: prevents codesign "resource fork" failure on bundled files
      # that were fetched from brew/huggingface and carry macOS quarantine/Finder metadata.
      - name: strip extended attributes from bundled files
        run: |
          set -euo pipefail
          xattr -cr desktop/python-sidecar/bin/
          xattr -cr desktop/python-sidecar/models/
          xattr -cr desktop/python-sidecar/*.py
          xattr -cr desktop/src/
          # desktop/public/ + desktop/assets/ may not exist on every build;
          # tolerate the absence so set -e doesn't abort.
          xattr -cr desktop/public/ 2>/dev/null || true
          xattr -cr desktop/assets/ 2>/dev/null || true
          xattr -cr desktop/src-tauri/icons/
          xattr -cr desktop/src-tauri/entitlements*
          xattr -cr desktop/src-tauri/*.xcprivacy
          xattr -cr desktop/src-tauri/target/release/ 2>/dev/null || true
          echo "✓ xattrs stripped"

      - name: import Developer ID certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # apple-actions/import-codesign-certs creates signing_temp.keychain but
      # doesn't always add it to codesign's search list — so `codesign --sign
      # "Developer ID Application: ..."` returns "no identity found" even
      # though the cert is imported. Force the keychain to the front of the
      # user search list and dump identities so we can confirm what's loaded.
      - name: register codesign keychain + verify identity
        run: |
          set -euo pipefail
          security list-keychains -d user -s signing_temp.keychain login.keychain
          security default-keychain -d user -s signing_temp.keychain || true
          security set-keychain-settings -lut 21600 signing_temp.keychain
          echo "--- identities visible to codesign ---"
          security find-identity -v -p codesigning
          echo "--- Developer ID identities ---"
          security find-identity -v -p codesigning | grep -i "Developer ID" || echo "(no Developer ID match)"

      # Apple's notarizer independently validates nested executables inside
      # the .app, so re-sign the bundled sidecar binaries with the Developer
      # ID + secure timestamp + hardened runtime BEFORE Tauri copies them
      # into the bundle. Tolerant of missing optional binaries (e.g.
      # junior-face-detect is a local-only Swift binary, not fetched in CI).
      - name: sign sidecar helper binaries
        run: |
          set -euo pipefail
          IDENTITY='Developer ID Application: daniel diyepriye dokubo (KT68NGT4LX)'
          codesign_with_retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if codesign "$@"; then
                return 0
              fi
              echo "codesign failed on attempt $attempt; retrying after timestamp service backoff..." >&2
              sleep $((attempt * 10))
            done
            codesign "$@"
          }
          for bin in \
            desktop/python-sidecar/bin/ffmpeg \
            desktop/python-sidecar/bin/ffprobe \
            desktop/python-sidecar/bin/junior-face-detect
          do
            if [ ! -f "$bin" ]; then
              echo "(skip) missing optional sidecar binary: $bin"
              continue
            fi
            echo "Signing $bin"
            codesign_with_retry --force --options runtime --timestamp --sign "$IDENTITY" "$bin"
            codesign --verify --strict --verbose=2 "$bin"
          done
          echo "✓ sidecar binaries signed"

      - name: build signed macOS app
        working-directory: ./desktop
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        # Per-arch native build. Each matrix runner builds its own slice; the
        # brew sidecar fetched earlier in this job is the matching arch. We do
        # not lipo a universal binary — instead we publish two DMGs.
        run: npm run tauri -- build --target ${{ matrix.target.rust_target }} --bundles app

      - name: repair-sign macOS app bundle
        run: |
          set -euo pipefail
          APP=$(find desktop/src-tauri/target -path '*/bundle/macos/Liquid Clips.app' -type d | head -1)
          if [ -z "$APP" ]; then
            echo "✗ No Liquid Clips.app bundle found" >&2
            exit 1
          fi
          desktop/scripts/sign-clean-macos-app.sh "$APP"

      - name: rebuild DMG + updater tarball from repaired app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APP=$(find desktop/src-tauri/target -path '*/bundle/macos/Liquid Clips.app' -type d | head -1)
          # Delete the stale tauri-default DMG (with space, unsigned container) before
          # rebuild so notarize.sh + upload glob only see the slugged + re-signed DMG.
          # Without this, v0.7.50 shipped an unstapled DMG because `find | head -1`
          # picked the unsigned tauri DMG and the upload glob uploaded a non-notarised file.
          find desktop/src-tauri/target -path '*/bundle/dmg/*.dmg' -type f -delete || true
          desktop/scripts/package-signed-macos-artifacts.sh "$APP" ${{ matrix.target.slug }}

      - name: notarize and staple .dmg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          DMG=$(find desktop/src-tauri/target -path '*/bundle/dmg/Liquid.Clips_*.dmg' -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "✗ No rebuilt .dmg found at bundle/dmg/Liquid.Clips_*.dmg" >&2
            exit 1
          fi
          echo "→ notarising $DMG"
          desktop/scripts/notarize.sh "$DMG"

      - name: verify notarized installer
        run: |
          set -euo pipefail
          DMG=$(find desktop/src-tauri/target -path '*/bundle/dmg/Liquid.Clips_*.dmg' -type f | head -1)
          echo "→ verifying $DMG"
          spctl --assess -vv --type install "$DMG"
          # Hard-require the staple ticket — without it, offline users hit Gatekeeper.
          xcrun stapler validate "$DMG"

      - name: create draft GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Liquid Clips ${{ github.ref_name }}
          draft: true
          prerelease: false
          body: |
            **What's new**
            See [CHANGELOG.md](./CHANGELOG.md) for full details.

            **Install**
            1. Download `Liquid.Clips_*_aarch64.dmg` for Apple Silicon or `Liquid.Clips_*_x86_64.dmg` for Intel
            2. Open the DMG, drag **Liquid Clips** to **Applications**
            3. Double-click from Applications — the app is signed and notarized by Apple.
          files: |
            desktop/src-tauri/target/**/bundle/dmg/Liquid.Clips_*.dmg
            desktop/src-tauri/target/**/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/**/bundle/macos/*.app.tar.gz.sig
